name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'apps/admin/**'
      - 'packages/shared/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - 'apps/admin/**'
      - 'packages/shared/**'

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24' # ログにある v24.13.0 に合わせる
          cache: 'pnpm'

      - name: Install Quasar CLI
        run: pnpm add -g @quasar/cli

      - name: Install dependencies and Build
        run: |
          cat << EOF > ./apps/admin/.env.production
          VITE_MSAL_CLIENT_ID=${{ vars.VITE_MSAL_CLIENT_ID }}
          VITE_MSAL_AUTHORITY=${{ vars.VITE_MSAL_AUTHORITY }}
          VITE_MSAL_REDIRECT_URI=${{ vars.VITE_MSAL_REDIRECT_URI }}
          VITE_APPLICATIONINSIGHTS_CONNECTION_STRING=${{ vars.VITE_APPLICATIONINSIGHTS_CONNECTION_STRING }}
          EOF
          pnpm install
          pnpm run build:admin
        working-directory: ./

      - name: Deploy
        id: deploy-azure-static-web-apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_CLIFF_06E496100 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "./apps/admin/dist/spa"
          output_location: ""
          skip_app_build: true
